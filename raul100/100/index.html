    <style>
        .flip-card {
            perspective: 1000px;
            cursor: pointer;
            height: 220px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.active .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card.active {
            z-index: 50;
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
            border-radius: 1rem;
            overflow: hidden;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        .card-number {
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .flip-card:hover .card-number {
            transform: scale(1.08);
            text-shadow: 0 2px 20px rgba(139, 26, 47, 0.9), 0 1px 4px rgba(0, 0, 0, 0.95) !important;
